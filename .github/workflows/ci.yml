name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # MinVer needs full history + tags

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Build and test
        run: dotnet run --project build -- test
